<!DOCTYPE html>
<!-- МОДУЛЬ: Калькулятор · Редактировать ТОЛЬКО этот файл -->
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор · Vadim Shteiman</title>
<link rel="stylesheet" href="style.css">
<style>
.qrow{display:grid;grid-template-columns:90px 1fr 1fr 1fr;gap:8px;align-items:end;margin-bottom:12px;}
@media(max-width:600px){.qrow{grid-template-columns:1fr 1fr;}}
.qrow label{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:4px;}
.qrow input{background:var(--bg3);border:.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:15px;font-weight:500;width:100%;outline:none;transition:border-color .2s;}
.qrow input:focus{border-color:rgba(195,165,76,0.5);}
.qrow input::placeholder{font-size:12px;font-weight:400;}
.calc-result{border-radius:10px;padding:1.25rem 1.5rem;margin-top:14px;font-family:'DM Mono',monospace;font-size:13px;line-height:2.4;display:none;}
.calc-result.hint{background:var(--blue-dim);border:.5px solid rgba(91,163,245,0.2);color:var(--blue);}
.calc-result.ready{background:var(--green-dim);border:.5px solid rgba(61,214,140,0.2);color:var(--green);}
.calc-result strong{color:var(--text);}
.calc-result .big{font-size:26px;font-weight:500;}
.calc-result .warn{color:var(--amber);}
.calc-result .dim{color:var(--muted);font-size:12px;}
.calc-reset{background:none;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;padding:0;text-decoration:underline;text-underline-offset:2px;}
.calc-reset:hover{color:var(--text);}
.auto-badge{font-size:10px;background:var(--blue-dim);color:var(--blue);border-radius:3px;padding:1px 5px;margin-left:4px;font-family:'DM Mono',monospace;}
#calcLog{margin-top:12px;display:flex;flex-direction:column;gap:8px;}
.calc-entry{background:var(--bg3);border:.5px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;}
.calc-entry-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.calc-ticker{font-family:'DM Mono',monospace;font-weight:500;color:var(--text);font-size:15px;}
.calc-nums{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-top:5px;line-height:1.9;border-top:.5px solid var(--border);padding-top:6px;}
.calc-nums .g{color:var(--green);}
.calc-nums .r{color:var(--red);}
.api-status{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto;}
</style>
</head>
<body data-page="calc">

<header id="site-header"></header>
<nav class="nav" id="site-nav"></nav>

<main>
  <div class="sec-label">Быстрый расчёт</div>
  <div class="card blue">
    <span class="tag blue">Тикер + Цена + Стоп за акцию → всё считается само</span>
    <div class="card-title">Вход · Стоп $ за акцию → Лот · Стоп цена · ТП <span class="auto-badge">auto</span></div>

    <div style="margin-top:14px;" class="jform">
      <div class="qrow">
        <div>
          <label>Тикер</label>
          <input type="text" id="c-ticker" placeholder="RKLB" oninput="calcPos()" style="text-transform:uppercase" onkeydown="tabNext(event,'c-entry')">
        </div>
        <div>
          <label>Цена входа ($)</label>
          <input type="number" id="c-entry" placeholder="75.00" step="0.01" oninput="calcPos()" onkeydown="tabNext(event,'c-stopdist')">
        </div>
        <div>
          <label>Стоп за акцию ($)</label>
          <input type="number" id="c-stopdist" placeholder="1.50" step="0.01" oninput="calcPos()" onkeydown="tabNext(event,'c-rr')">
        </div>
        <div>
          <label>R:R цель</label>
          <input type="number" id="c-rr" value="2" step="0.5" min="1" oninput="calcPos()">
        </div>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-top:2px;">
        <div style="flex:1;min-width:140px;">
          <label>Капитал ($)</label>
          <input type="number" id="c-capital" value="104927" oninput="calcPos()" style="background:var(--bg3);border:.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;width:100%;outline:none;">
        </div>
        <div style="flex:1;min-width:120px;">
          <label>Риск (%)</label>
          <input type="number" id="c-risk-pct" value="0.75" step="0.05" oninput="calcPos()" style="background:var(--bg3);border:.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;width:100%;outline:none;">
        </div>
        <div style="padding-bottom:2px;display:flex;gap:8px;align-items:center;">
          <button class="btn sm" id="save-calc-btn" onclick="saveCalc()" style="display:none;">Сохранить расчёт</button>
          <button class="calc-reset" onclick="resetCalc()">Сбросить</button>
        </div>
      </div>

      <div id="calc-result" class="calc-result"></div>
    </div>
  </div>

  <div class="sec-label">
    История расчётов
    <span class="api-status" id="api-status">Загружаю...</span>
  </div>
  <div id="calcLog"></div>

  <div class="sec-label">Формула</div>
  <div class="formula">
    Риск $ = <strong>Капитал × % риска</strong><br>
    Лот = <strong>Риск $ ÷ Стоп за акцию</strong><br>
    Стоп цена = <strong>Вход − Стоп за акцию</strong><br>
    ТП = <strong>Вход + Стоп за акцию × R:R</strong>
  </div>
</main>

<script src="nav.js"></script>
<script>
const API = 'https://script.google.com/macros/s/AKfycbzjHFJsyxSCviQOeMsYIA6uoKGh646haYuEFGhfb-0FG0g1PSyN4AeTTgR8eVX3ffY/exec';
let calcs = [];
let lastCalc = null;

function setStatus(msg, color) {
  const el = document.getElementById('api-status');
  if (el) { el.textContent = msg; el.style.color = color || 'var(--muted)'; }
}

async function apiCall(params) {
  const url = API + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  return res.json();
}

function tabNext(e, nextId) {
  if (e.key === 'Enter' || e.key === 'Tab') {
    e.preventDefault();
    document.getElementById(nextId).focus();
    calcPos();
  }
}

function calcPos() {
  const capital  = parseFloat(document.getElementById('c-capital').value) || 0;
  const riskPct  = parseFloat(document.getElementById('c-risk-pct').value) || 0;
  const entry    = parseFloat(document.getElementById('c-entry').value);
  const stopDist = parseFloat(document.getElementById('c-stopdist').value);
  const rr       = parseFloat(document.getElementById('c-rr').value) || 2;
  const ticker   = (document.getElementById('c-ticker').value || '').toUpperCase();
  const el       = document.getElementById('calc-result');
  const saveBtn  = document.getElementById('save-calc-btn');

  if (!entry) { el.style.display = 'none'; saveBtn.style.display = 'none'; lastCalc = null; return; }

  const riskUsd = capital * riskPct / 100;

  // Только цена входа — показываем бюджет риска
  if (!stopDist || stopDist <= 0) {
    el.className = 'calc-result hint';
    el.style.display = 'block';
    el.innerHTML = `
      ${ticker ? `<strong>${ticker}</strong> &nbsp;` : ''}Вход: <strong>$${entry}</strong><br>
      Бюджет риска: <strong>$${riskUsd.toFixed(0)}</strong> <span class="dim">(${riskPct}% от $${capital.toLocaleString('ru')})</span><br>
      <span class="dim">← введи стоп за акцию чтобы рассчитать лот и ТП</span>
    `;
    saveBtn.style.display = 'none';
    lastCalc = null;
    return;
  }

  const lot       = Math.floor(riskUsd / stopDist);
  if (lot <= 0) { el.style.display = 'none'; saveBtn.style.display = 'none'; return; }

  const stopPrice = entry - stopDist;
  const tp2       = entry + stopDist * rr;
  const tp3       = entry + stopDist * 3;
  const actualRisk= lot * stopDist;
  const profit2   = lot * (tp2 - entry);
  const profit3   = lot * (tp3 - entry);
  const posSize   = lot * entry;
  const pctOfCap  = (posSize / capital * 100).toFixed(1);
  const sizeWarn  = posSize > capital * 0.5
    ? `<br><span class="warn">⚠ Позиция ${pctOfCap}% от капитала — осторожно</span>` : '';

  el.className = 'calc-result ready';
  el.style.display = 'block';
  el.innerHTML = `
    ${ticker ? `<strong>${ticker}</strong> &nbsp;` : ''}Вход: <strong>$${entry}</strong><br>
    Лот: <span class="big">${lot} акций</span> <span class="dim">· $${posSize.toLocaleString('ru')} (${pctOfCap}% капитала)</span><br>
    Стоп: <strong style="color:var(--red);">$${stopPrice.toFixed(2)}</strong> <span class="dim">(−$${stopDist}/акц · риск $${actualRisk.toFixed(0)})</span><br>
    ТП ${rr}R: <strong style="color:var(--green);">$${tp2.toFixed(2)}</strong> <span class="dim">(+$${profit2.toFixed(0)})</span><br>
    ТП 3R:&nbsp;&nbsp;<strong style="color:var(--green);">$${tp3.toFixed(2)}</strong> <span class="dim">(+$${profit3.toFixed(0)})</span>
    ${rr < 2 ? `<br><span class="warn">⚠ R:R = ${rr} — ниже минимума 2R</span>` : ''}${sizeWarn}
  `;

  saveBtn.style.display = '';
  lastCalc = {
    'Дата':      new Date().toISOString().split('T')[0],
    'Тикер':     ticker || '—',
    'Вход':      entry,
    'Стоп $':    stopDist,
    'Стоп цена': stopPrice.toFixed(2),
    'Лот':       lot,
    'Риск $':    actualRisk.toFixed(0),
    'ТП 2R':     tp2.toFixed(2),
    'Профит 2R': profit2.toFixed(0),
    'ТП 3R':     tp3.toFixed(2),
    'Профит 3R': profit3.toFixed(0),
    'Капитал':   capital,
    '% риска':   riskPct,
    'ID':        String(Date.now()),
  };
}

async function saveCalc() {
  if (!lastCalc) return;
  const btn = document.getElementById('save-calc-btn');
  btn.textContent = 'Сохраняю...';
  btn.disabled = true;
  setStatus('Сохраняю...', 'var(--amber)');
  try {
    const res = await apiCall({ action: 'save', sheet: 'calc', record: JSON.stringify(lastCalc) });
    if (!res.ok) throw new Error();
    setStatus('Сохранено ✓', 'var(--green)');
    await loadCalcs();
    resetCalc();
  } catch(e) {
    setStatus('Ошибка', 'var(--red)');
    alert('Не удалось сохранить. Проверь соединение.');
  } finally {
    btn.textContent = 'Сохранить расчёт';
    btn.disabled = false;
  }
}

async function deleteCalc(id) {
  if (!confirm('Удалить расчёт?')) return;
  setStatus('Удаляю...', 'var(--amber)');
  try {
    await apiCall({ action: 'delete', sheet: 'calc', id: String(id) });
    setStatus('Удалено ✓', 'var(--green)');
    await loadCalcs();
  } catch(e) {
    setStatus('Ошибка', 'var(--red)');
  }
}

async function loadCalcs() {
  setStatus('Загружаю...', 'var(--amber)');
  try {
    const data = await apiCall({ action: 'read', sheet: 'calc' });
    if (!data.ok) throw new Error();
    calcs = (data.rows || []).reverse();
    setStatus(calcs.length ? `${calcs.length} расчётов` : 'Нет записей', 'var(--muted)');
    renderCalcs();
  } catch(e) {
    setStatus('Ошибка загрузки', 'var(--red)');
  }
}

function renderCalcs() {
  const el = document.getElementById('calcLog');
  if (calcs.length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:1.5rem;font-size:13px;color:var(--muted)">Сохранённых расчётов нет</div>';
    return;
  }
  el.innerHTML = calcs.map(c => `
    <div class="calc-entry">
      <div class="calc-entry-header">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span class="calc-ticker">${c['Тикер'] || '—'}</span>
          <span style="font-size:12px;color:var(--muted);">${c['Дата'] || ''}</span>
          <span style="font-size:12px;color:var(--muted);">@$${c['Вход']} · ${c['Лот']} акций</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--green);">+$${c['Профит 2R']}</span>
          <button class="btn sm danger" onclick="deleteCalc('${c['ID']}')">✕</button>
        </div>
      </div>
      <div class="calc-nums">
        Стоп: <span class="r">$${c['Стоп цена']}</span> &nbsp;·&nbsp;
        Риск: $${c['Риск $']} &nbsp;·&nbsp;
        ТП 2R: <span class="g">$${c['ТП 2R']}</span> <span>(+$${c['Профит 2R']})</span> &nbsp;·&nbsp;
        ТП 3R: <span class="g">$${c['ТП 3R']}</span> <span>(+$${c['Профит 3R']})</span>
      </div>
    </div>
  `).join('');
}

function resetCalc() {
  ['c-ticker','c-entry','c-stopdist'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('c-rr').value = '2';
  document.getElementById('calc-result').style.display = 'none';
  document.getElementById('save-calc-btn').style.display = 'none';
  lastCalc = null;
  document.getElementById('c-ticker').focus();
}

loadCalcs();
</script>
</body>
</html>
